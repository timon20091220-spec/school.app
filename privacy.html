<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>개인정보 처리방침</title><style>body{font-family:system-ui,sans-serif;max-width:720px;margin:auto;padding:40px 22px;line-height:1.7;color:#111827}h1{font-size:30px}p{color:#5f6877}</style></head><body><h1>개인정보 처리방침</h1><p>본 페이지는 배문고 학교 앱 시제품용 안내입니다. 현재 시제품은 서버로 개인정보를 전송하지 않으며, 입력한 예약 정보는 사용 중인 기기의 브라우저 저장소에만 저장됩니다.</p><p>실제 서비스 전환 시 학교의 개인정보 처리 기준과 별도의 동의 절차가 적용되어야 합니다.</p></body></html>
