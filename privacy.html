<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>개인정보 처리방침</title><style>body{font-family:system-ui,sans-serif;max-width:720px;margin:auto;padding:40px 22px;line-height:1.7;color:#111827}h1{font-size:30px}h2{margin-top:28px}p{color:#5f6877}</style></head><body><h1>개인정보 처리방침</h1><p>본 페이지는 배문고 학교 앱 시제품용 안내입니다.</p><h2>시제품 저장 정보</h2><p>학생 로그인 정보, 게시글, 댓글, 신고, 예약 정보는 현재 사용 중인 기기의 브라우저 저장소에만 저장됩니다. 외부 서버로 전송되지 않습니다.</p><h2>정식 운영 전환</h2><p>정식 서비스에서는 학교 승인, 학생 명단 검증, 계정 인증, 보안 규칙, 데이터 보관 기간, 신고 처리 절차와 별도 동의가 필요합니다.</p></body></html>
